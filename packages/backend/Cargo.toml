[package]
name = "circuitsim-engine"
version = "0.1.0"
edition = "2024"

[features]
default=["serde"]
serde=["dep:serde", "dep:serde_json"]

[dependencies]
enum_dispatch = "0.3.13"
petgraph = "0.8.3"
serde = { version = "1.0.228", features = ["derive"], optional = true }
serde_json = { version = "1.0.145", optional = true }
slotmap = "1.0.7"
strum = { version = "0.28.0", features = ["derive"] }
thiserror = "2.0.18"
