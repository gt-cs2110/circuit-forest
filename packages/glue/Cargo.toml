
[package]
edition = "2024"
name = "glue"
version = "0.1.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3.0.0", features = ["napi6"] }
 # Use napi6 for big int
napi-derive = "3.0.0"
once_cell = "1.21.4"
slotmap = "1.1.1"

[dependencies.circuitsim-engine]
path = "../backend"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
codegen-units = 1
strip = "symbols"
